<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機材在庫管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="機材管理">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-label">読み込み中...</div>
</div>
<div class="app">
  <header class="topbar">
    <div class="topbar-left">
      <i class="ti ti-package" aria-hidden="true"></i>
      <h1>機材在庫管理</h1>
    </div>
    <div class="topbar-right">
      <button class="btn" onclick="reloadData()" id="reload-btn"><i class="ti ti-refresh" aria-hidden="true"></i> 更新</button>
      <button class="btn" onclick="downloadPickupList()" id="pickup-btn"><i class="ti ti-file-download" aria-hidden="true"></i> 持ち出しリスト</button>
      <button class="btn" onclick="document.getElementById('xlsxIn').click()"><i class="ti ti-upload" aria-hidden="true"></i> Excel読み込み</button>
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download" aria-hidden="true"></i> CSV出力</button>
      <button class="btn btn-primary" onclick="openAddModal()"><i class="ti ti-plus" aria-hidden="true"></i> 機材追加</button>
      <input type="file" id="xlsxIn" accept=".xlsx,.csv" style="display:none" onchange="handleFile(event)">
    </div>
  </header>

  <div id="cache-banner">
    <span><i class="ti ti-database"></i> キャッシュから表示中 — バックグラウンドで更新しています</span>
    <button class="btn" style="font-size:11px;padding:2px 8px" onclick="document.getElementById('cache-banner').classList.remove('show')">閉じる</button>
  </div>
  <div class="stats" id="stats"></div>

  <div class="legend">
    <span class="badge s-in"><i class="ti ti-circle-check"></i> IN</span>
    <span class="badge s-partial"><i class="ti ti-circle-half"></i> PARTIAL</span>
    <span class="badge s-out"><i class="ti ti-circle-x"></i> OUT</span>
    <span class="badge s-repair"><i class="ti ti-tool"></i> 修理中</span>
    <span class="badge s-rental"><i class="ti ti-building-store"></i> レンタル中</span>
    <span class="badge s-absent"><i class="ti ti-clock-off"></i> 長期不在</span>
  </div>

  <nav class="tab-bar">
    <button class="tab on" onclick="switchTab('all',this)">すべて</button>
    <button class="tab" onclick="switchTab('out',this)">持ち出し中</button>
    <button class="tab" onclick="switchTab('special',this)">修理・レンタル・不在</button>
    <button class="tab" onclick="switchTab('history',this)">履歴</button>
    <button class="tab" onclick="switchTab('dashboard',this)"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> ダッシュボード</button>
  </nav>

  <div id="view-all">
    <div class="controls">
      <input type="text" id="srch" placeholder="検索（機材名・メーカー・備考）" oninput="render()">
      <select id="stF" onchange="render()">
        <option value="">すべてのステータス</option>
        <option value="IN">IN</option><option value="PARTIAL">PARTIAL</option>
        <option value="OUT">OUT</option><option value="修理中">修理中</option>
        <option value="レンタル中">レンタル中</option><option value="長期不在">長期不在</option>
      </select>
    </div>
    <div class="inv-layout">
      <div class="cat-sidebar" id="cat-sidebar"></div>
      <div class="card-main" id="card-main"></div>
    </div>
  </div>

  <div id="view-out" style="display:none">
    <div id="out-container"></div>
  </div>

  <div id="view-special" style="display:none">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:12%">カテゴリ</th><th style="width:13%">メーカー</th>
          <th style="width:18%">型番・品名</th><th style="width:6%">数量</th>
          <th style="width:13%">ステータス</th>
          <th style="width:28%">備考（預け先・返却予定等）</th>
          <th style="width:10%">操作</th>
        </tr></thead>
        <tbody id="tbl-special"></tbody>
      </table>
    </div>
  </div>

  <div id="view-history" style="display:none">
    <div class="controls">
      <input type="text" id="hist-srch" placeholder="案件名・担当者・機材名で検索" oninput="renderHistory()">
    </div>
    <div id="hist-container"></div>
  </div>

  <div id="view-dashboard" style="display:none">
    <div id="dashboard-container"></div>
  </div>
</div>

<!-- Item detail modal -->
<div class="modal-backdrop" id="modal-detail">
  <div class="modal">
    <h3><i class="ti ti-package"></i> <span id="detail-name"></span></h3>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px" id="detail-maker"></div>
    <div style="margin-bottom:8px" id="detail-badge"></div>
    <div style="font-size:14px;margin-bottom:8px" id="detail-counts"></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px">備考: <span id="detail-note"></span></div>
    <div class="modal-actions" id="detail-actions"></div>
    <div class="modal-actions" style="margin-top:8px">
      <button class="btn" onclick="closeModal('modal-detail')">閉じる</button>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-backdrop" id="modal-checkout">
  <div class="modal">
    <h3><i class="ti ti-arrow-up-right"></i> 持ち出し申請</h3>
    <div class="fr"><label>機材</label><input id="co-item" readonly></div>
    <div class="fr"><label>持ち出し数（残数: <span id="co-avail"></span>）</label><input type="number" id="co-qty" min="1" value="1"></div>
    <div class="fr"><label>案件名</label><input id="co-proj" placeholder="例: ○○ライブ"></div>
    <div class="fr"><label>担当者</label><input id="co-staff" placeholder="担当者名"></div>
    <div class="fr"><label>返却予定日時（例: 2026/5/28 23:00）</label><input id="co-ret" placeholder="未設定の場合は手動返却"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-checkout')">キャンセル</button>
      <button class="btn btn-primary" onclick="doCheckout()">持ち出し確定</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-special">
  <div class="modal">
    <h3><i class="ti ti-tool"></i> 特殊ステータス設定</h3>
    <div class="fr"><label>機材</label><input id="sp-item" readonly></div>
    <div class="fr"><label>ステータス</label>
      <select id="sp-status">
        <option value="修理中">修理中</option>
        <option value="レンタル中">レンタル中</option>
        <option value="長期不在">長期不在</option>
      </select>
    </div>
    <div class="fr"><label>数量</label><input type="number" id="sp-qty" min="1" value="1"></div>
    <div class="fr"><label>備考（預け先・返却予定・理由等）</label><textarea id="sp-note" placeholder="例: ○○修理店 預け日5/1 返却予定6/1"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-special')">キャンセル</button>
      <button class="btn btn-primary" onclick="doSpecial()">設定確定</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-add">
  <div class="modal">
    <h3><i class="ti ti-plus"></i> 機材追加</h3>
    <div class="fr">
      <label>カテゴリ</label>
      <div class="combo-wrap">
        <select id="add-cat-sel" onchange="syncCombo('add-cat-sel','add-cat')">
          <option value="">— 新規入力 —</option>
        </select>
        <input id="add-cat" placeholder="または直接入力">
      </div>
    </div>
    <div class="fr">
      <label>メーカー</label>
      <div class="combo-wrap">
        <select id="add-maker-sel" onchange="syncCombo('add-maker-sel','add-maker')">
          <option value="">— 新規入力 —</option>
        </select>
        <input id="add-maker" placeholder="または直接入力">
      </div>
    </div>
    <div class="fr"><label>型番・品名</label><input id="add-model" placeholder="例: SM58"></div>
    <div class="fr"><label>総在庫数</label><input type="number" id="add-qty" min="1" value="1"></div>
    <div class="fr"><label>備考</label><input id="add-note" placeholder="任意"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-add')">キャンセル</button>
      <button class="btn btn-primary" onclick="doAdd()">追加</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-return">
  <div class="modal">
    <h3><i class="ti ti-arrow-down-left"></i> 返却処理</h3>
    <div class="fr"><label>機材</label><input id="ret-item" readonly></div>
    <div class="fr"><label>返却数</label><input type="number" id="ret-qty" min="1" value="1"></div>
    <div class="fr"><label>備考</label><input id="ret-note" placeholder="任意"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-return')">キャンセル</button>
      <button class="btn btn-primary" onclick="doReturn()">返却確定</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-note">
  <div class="modal">
    <h3><i class="ti ti-notes"></i> 備考編集</h3>
    <div class="fr"><label>機材</label><input id="note-item" readonly></div>
    <div class="fr"><label>備考</label><textarea id="note-text" placeholder="修理先・レンタル先・返却予定・その他メモ"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-note')">キャンセル</button>
      <button class="btn btn-primary" onclick="doEditNote()">保存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>
<div class="modal-backdrop" id="modal-project-detail">
  <div class="modal">
    <h3><i class="ti ti-package" aria-hidden="true"></i> <span id="pd-project"></span></h3>
    <div class="fr">
      <div style="display:flex;gap:16px;font-size:12px;color:var(--text2);margin-bottom:8px">
        <span><i class="ti ti-user" aria-hidden="true"></i> <span id="pd-staff"></span></span>
        <span><i class="ti ti-arrow-up-right" aria-hidden="true"></i> <span id="pd-dateout"></span></span>
        <span><i class="ti ti-arrow-down-left" aria-hidden="true"></i> <span id="pd-dateret"></span></span>
      </div>
      <div id="pd-items"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="downloadPickupList()"><i class="ti ti-file-download"></i> 持ち出しリストDL</button>
      <button class="btn btn-primary" onclick="closeModal('modal-project-detail')">閉じる</button>
    </div>
  </div>
</div>

</body>
</html>
